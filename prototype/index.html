<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국형 상세페이지 자동 생성기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    color: #333;
    min-height: 100vh;
  }

  /* ─── 전체 레이아웃 ─── */
  .app-header {
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-header .logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 900; font-size: 16px;
  }
  .app-header h1 { font-size: 18px; font-weight: 800; color: #111; }
  .app-header .subtitle { font-size: 13px; color: #888; margin-left: 4px; }

  .app-body {
    display: flex;
    max-width: 1300px;
    margin: 0 auto;
    gap: 24px;
    padding: 24px;
    align-items: flex-start;
  }

  /* ─── 입력 폼 ─── */
  .form-panel {
    width: 350px;
    min-width: 350px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    padding: 28px 24px;
    position: sticky;
    top: 80px;
    max-height: calc(100vh - 100px);
    overflow-y: auto;
  }
  .form-panel h2 { font-size: 20px; font-weight: 800; color: #111; margin-bottom: 4px; }
  .form-panel .desc { font-size: 13px; color: #999; margin-bottom: 24px; }

  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: #555;
    margin-bottom: 6px;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    color: #222;
    background: #fafafa;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    background: #fff;
  }
  .form-group textarea { resize: vertical; min-height: 90px; }
  .form-group .hint { font-size: 12px; color: #bbb; margin-top: 4px; }

  .palette-preview {
    padding: 14px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    transition: background 0.3s;
  }
  .palette-preview .swatch {
    width: 36px; height: 36px; border-radius: 10px;
    transition: background 0.3s;
  }
  .palette-preview .info { font-size: 12px; color: #888; }
  .palette-preview .info strong { display: block; font-size: 14px; font-weight: 700; transition: color 0.3s; }

  .btn-generate {
    width: 100%;
    padding: 15px 0;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-generate:disabled {
    background: #ccc !important;
    cursor: not-allowed;
  }
  .btn-generate:not(:disabled):hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }

  /* ─── 미리보기 패널 ─── */
  .preview-panel {
    flex: 1;
    max-width: 900px;
    min-width: 0;
  }

  .preview-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-bottom: 16px;
  }
  .btn-action {
    padding: 10px 22px;
    font-size: 13px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn-action:hover { transform: translateY(-1px); }

  .preview-empty {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    padding: 120px 40px;
    text-align: center;
    color: #bbb;
  }
  .preview-empty .icon { font-size: 64px; margin-bottom: 20px; opacity: 0.3; }
  .preview-empty h3 { font-size: 20px; font-weight: 700; color: #aaa; margin-bottom: 8px; }
  .preview-empty p { font-size: 14px; }

  .preview-frame {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 40px rgba(0,0,0,0.08);
    overflow: hidden;
    width: 100%;
    max-width: 860px;
  }

  /* ─── 상세페이지 섹션 공통 ─── */
  .dp-hero {
    padding: 80px 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .dp-hero::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }
  .dp-hero h1 {
    font-size: 34px;
    font-weight: 900;
    color: #fff;
    line-height: 1.5;
    white-space: pre-line;
    margin-bottom: 18px;
    position: relative;
  }
  .dp-hero .sub {
    font-size: 17px;
    color: rgba(255,255,255,0.88);
    line-height: 1.6;
    position: relative;
  }
  .dp-hero .price-badge {
    display: inline-block;
    margin-top: 28px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(4px);
    padding: 12px 36px;
    border-radius: 50px;
    position: relative;
  }
  .dp-hero .price-badge span {
    font-size: 28px; font-weight: 900; color: #fff;
  }

  .dp-section {
    padding: 56px 44px;
  }
  .dp-section h2 {
    font-size: 24px;
    font-weight: 800;
    color: #222;
    text-align: center;
    margin-bottom: 36px;
    line-height: 1.4;
  }

  .dp-divider {
    height: 10px;
  }

  .usp-card {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 22px;
    border-radius: 16px;
    margin-bottom: 16px;
    transition: transform 0.15s;
  }
  .usp-card:hover { transform: translateX(4px); }
  .usp-num {
    min-width: 44px; height: 44px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800;
  }
  .usp-card .usp-icon {
    min-width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .usp-card p {
    font-size: 16px; line-height: 1.7; color: #333;
    margin: 0; padding-top: 8px;
  }

  .detail-text {
    font-size: 16px;
    line-height: 2;
    color: #444;
    text-align: center;
    max-width: 700px;
    margin: 0 auto;
  }

  .howto-list {
    max-width: 620px;
    margin: 0 auto;
    counter-reset: howto;
  }
  .howto-item {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 20px;
    padding: 18px 22px;
    background: #f9f9f9;
    border-radius: 14px;
  }
  .howto-step {
    min-width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 800; color: #fff;
  }
  .howto-item p {
    font-size: 15px;
    line-height: 1.7;
    color: #444;
    padding-top: 5px;
  }

  .faq-card {
    margin-bottom: 16px;
    padding: 22px;
    background: #f9f9f9;
    border-radius: 14px;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
    margin-bottom: 16px;
  }
  .faq-card .q {
    font-size: 15px;
    font-weight: 700;
    color: #222;
    margin-bottom: 10px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .faq-card .q .badge {
    min-width: 24px; height: 24px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; color: #fff;
  }
  .faq-card .a {
    font-size: 14px; line-height: 1.8; color: #666;
    padding-left: 32px;
  }

  .dp-cta {
    padding: 64px 44px;
    text-align: center;
  }
  .dp-cta h3 {
    font-size: 24px; font-weight: 800;
    margin-bottom: 24px;
  }
  .dp-cta .cta-btn {
    display: inline-block;
    padding: 18px 64px;
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    border-radius: 50px;
    text-decoration: none;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  .dp-cta .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(0,0,0,0.2);
  }
  .dp-cta .cta-sub {
    margin-top: 16px;
    font-size: 13px;
    color: #999;
  }

  /* 스크롤바 */
  .form-panel::-webkit-scrollbar { width: 5px; }
  .form-panel::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
</style>
</head>
<body>

<!-- ═══ 앱 헤더 ═══ -->
<header class="app-header">
  <div class="logo">DP</div>
  <h1>상세페이지 자동 생성기</h1>
  <span class="subtitle">한국형 상세페이지 카피 & 레이아웃</span>
</header>

<!-- ═══ 앱 본문 ═══ -->
<div class="app-body">

  <!-- ═══ 왼쪽: 입력 폼 ═══ -->
  <div class="form-panel">
    <h2>상품 정보 입력</h2>
    <p class="desc">상품 정보를 입력하면 자동으로 상세페이지를 생성합니다</p>

    <div class="form-group">
      <label>상품명 *</label>
      <input type="text" id="inp-name" placeholder="예: 제주 감귤 콜라겐 젤리">
    </div>

    <div class="form-group">
      <label>카테고리 *</label>
      <select id="inp-category">
        <option value="식품">식품</option>
        <option value="화장품">화장품</option>
        <option value="건기식">건강기능식품</option>
        <option value="가전">가전</option>
        <option value="패션">패션</option>
        <option value="생활용품">생활용품</option>
      </select>
    </div>

    <div class="form-group">
      <label>핵심 특징 *</label>
      <textarea id="inp-features" rows="4" placeholder="예:&#10;100% 제주산 감귤 추출물 사용&#10;저분자 콜라겐 1000mg 함유&#10;설탕 무첨가, 칼로리 부담 없음"></textarea>
      <p class="hint">한 줄에 하나씩 입력해 주세요</p>
    </div>

    <div class="form-group">
      <label>타겟 고객 *</label>
      <input type="text" id="inp-target" placeholder="예: 20~30대 건강 관리에 관심 있는 여성">
    </div>

    <div class="form-group">
      <label>가격대</label>
      <input type="text" id="inp-price" placeholder="예: 29800">
    </div>

    <div class="palette-preview" id="palette-preview">
      <div class="swatch" id="palette-swatch"></div>
      <div class="info">
        <span>선택된 카테고리 팔레트</span>
        <strong id="palette-label">식품</strong>
      </div>
    </div>

    <button class="btn-generate" id="btn-generate" disabled>상세페이지 생성</button>
  </div>

  <!-- ═══ 오른쪽: 미리보기 ═══ -->
  <div class="preview-panel">
    <div class="preview-actions" id="preview-actions" style="display:none;">
      <button class="btn-action" id="btn-regenerate">🔄 다시 생성</button>
      <button class="btn-action" id="btn-download">⬇ HTML 다운로드</button>
    </div>
    <div id="preview-area">
      <div class="preview-empty">
        <div class="icon">📄</div>
        <h3>미리보기</h3>
        <p>왼쪽에서 상품 정보를 입력하고<br>"상세페이지 생성" 버튼을 눌러주세요</p>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  데이터: 카테고리별 팔레트
// ══════════════════════════════════════════
const PALETTES = {
  '식품':   { primary:'#E85D2A', secondary:'#FFF3ED', accent:'#C44D1F', text:'#4A2410', badge:'#FFECD6' },
  '화장품': { primary:'#C75B9B', secondary:'#FDF2F8', accent:'#A14580', text:'#4A1942', badge:'#F9E0F0' },
  '건기식': { primary:'#2D9F5D', secondary:'#EDFFF4', accent:'#1F7A45', text:'#0F3D22', badge:'#D4F5E2' },
  '가전':   { primary:'#2563EB', secondary:'#EFF6FF', accent:'#1D4ED8', text:'#1E2A4A', badge:'#DBEAFE' },
  '패션':   { primary:'#1A1A1A', secondary:'#F9F9F9', accent:'#333333', text:'#111111', badge:'#E8E8E8' },
  '생활용품':{ primary:'#7C3AED', secondary:'#F5F3FF', accent:'#6D28D9', text:'#2E1065', badge:'#EDE9FE' },
};

// ══════════════════════════════════════════
//  데이터: USP 템플릿 (카테고리별)
// ══════════════════════════════════════════
const USP_TEMPLATES = {
  '식품': [
    p => `${p.name}만의 프리미엄 원재료로 깊은 풍미를 완성`,
    p => `HACCP 인증 시설에서 엄격한 품질관리로 생산`,
    p => `${p.target}이 선택한 건강한 맛의 비결`,
    p => `간편하게 즐기는 레스토랑급 퀄리티`,
    p => `합성첨가물 ZERO, 자연 그대로의 맛`,
    p => `국내산 원료 100% 사용으로 신뢰할 수 있는 품질`,
    p => `전통 레시피를 현대적으로 재해석한 프리미엄 ${p.name}`,
  ],
  '화장품': [
    p => `피부과 전문의가 인정한 ${p.name}의 핵심 성분`,
    p => `민감성 피부도 안심, 저자극 포뮬러 설계`,
    p => `사용 4주 만에 체감하는 확실한 변화`,
    p => `${p.target}의 피부 고민을 정조준한 맞춤 솔루션`,
    p => `글로벌 트렌드를 반영한 K-뷰티 기술력`,
    p => `자연 유래 성분 92% 함유, 피부에 순한 처방`,
    p => `임상 시험을 통해 효과가 검증된 성분 배합`,
  ],
  '건기식': [
    p => `식약처 인증 기능성 원료 ${p.name} 핵심 성분`,
    p => `체내 흡수율을 극대화한 특허 기술 적용`,
    p => `${p.target}의 건강 루틴에 최적화된 설계`,
    p => `하루 1포로 간편하게 관리하는 건강 습관`,
    p => `GMP 인증 시설에서 생산한 프리미엄 품질`,
    p => `불필요한 합성첨가물을 배제한 클린 포뮬러`,
    p => `원료부터 완제품까지 3중 품질 검사 시스템`,
  ],
  '가전': [
    p => `${p.name}만의 독자적 스마트 기술 탑재`,
    p => `에너지 효율 1등급, 전기료 걱정 끝`,
    p => `${p.target}의 라이프스타일에 맞춘 스마트 설계`,
    p => `소음 최소화 기술로 조용한 일상 보장`,
    p => `직관적 UI로 누구나 쉬운 사용 경험`,
    p => `IoT 연동으로 스마트폰 원격 제어 가능`,
    p => `3년 무상 A/S와 함께하는 든든한 품질 보증`,
  ],
  '패션': [
    p => `트렌드와 실용성을 동시에 잡은 ${p.name} 디자인`,
    p => `프리미엄 원단으로 완성한 차별화된 착용감`,
    p => `${p.target}의 스타일을 한 단계 업그레이드`,
    p => `시즌 내내 활용 가능한 다재다능한 아이템`,
    p => `까다로운 핏 테스트를 통과한 완벽 실루엣`,
    p => `세탁 후에도 변형 없는 형태 안정성`,
    p => `디테일 하나까지 신경 쓴 장인 정신의 결과물`,
  ],
  '생활용품': [
    p => `일상의 불편함을 해결하는 ${p.name}의 스마트 설계`,
    p => `친환경 소재 사용으로 지구도 함께 생각`,
    p => `${p.target}이 만족한 실사용 후기 폭발`,
    p => `공간 효율을 극대화하는 미니멀 디자인`,
    p => `국내 최고 품질 기준을 충족하는 안전성`,
    p => `실용성과 디자인을 모두 갖춘 올인원 솔루션`,
    p => `사용할수록 만족도가 높아지는 내구성`,
  ],
};

// ══════════════════════════════════════════
//  데이터: 헤드라인 템플릿
// ══════════════════════════════════════════
const HEADLINE_TEMPLATES = [
  p => [`${p.target}이 열광하는\n${p.name}의 비밀`, `지금까지 이런 ${p.catLabel}은 없었다`],
  p => [`당신의 일상을 바꿀\n단 하나의 선택, ${p.name}`, `${p.target}을 위해 완성한 프리미엄 ${p.catLabel}`],
  p => [`${p.name}\n차원이 다른 경험의 시작`, `${(p.features.split('\n')[0] || '').trim() || '완벽한 품질'}을 직접 확인하세요`],
  p => [`아직도 고민 중이세요?\n${p.name}이면 충분합니다`, `${p.target} 사이에서 입소문난 그 제품`],
  p => [`${p.name},\n이것이 진짜입니다`, `${p.target}이 인정한 프리미엄 ${p.catLabel}`],
  p => [`매일이 특별해지는\n${p.name}의 마법`, `${p.catLabel}의 새로운 기준을 제시합니다`],
];

// ══════════════════════════════════════════
//  유틸리티
// ══════════════════════════════════════════
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shufflePick(arr, n) {
  const s = [...arr].sort(() => Math.random() - 0.5);
  return s.slice(0, Math.min(n, s.length));
}
function formatPrice(price) {
  if (!price) return '';
  const num = Number(String(price).replace(/[^0-9]/g, ''));
  return isNaN(num) ? '' : num.toLocaleString('ko-KR') + '원';
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const $name     = document.getElementById('inp-name');
const $category = document.getElementById('inp-category');
const $features = document.getElementById('inp-features');
const $target   = document.getElementById('inp-target');
const $price    = document.getElementById('inp-price');

const $palPrev  = document.getElementById('palette-preview');
const $palSw    = document.getElementById('palette-swatch');
const $palLbl   = document.getElementById('palette-label');

const CAT_LABELS = { '식품':'식품', '화장품':'화장품', '건기식':'건강기능식품', '가전':'가전', '패션':'패션', '생활용품':'생활용품' };

let currentGenerated = null;

// ══════════════════════════════════════════
//  팔레트 프리뷰 업데이트
// ══════════════════════════════════════════
function updatePalettePreview() {
  const cat = $category.value;
  const pal = PALETTES[cat];
  $palPrev.style.background = pal.secondary;
  $palPrev.style.border = `1px solid ${pal.badge}`;
  $palSw.style.background = pal.primary;
  $palLbl.style.color = pal.text;
  $palLbl.textContent = CAT_LABELS[cat];
}

// ══════════════════════════════════════════
//  버튼 활성화 체크
// ══════════════════════════════════════════
function checkFormValid() {
  const valid = $name.value.trim() && $features.value.trim() && $target.value.trim();
  $btnGen.disabled = !valid;
  const pal = PALETTES[$category.value];
  $btnGen.style.background = valid ? pal.primary : '#ccc';
}

// ══════════════════════════════════════════
//  생성 로직
// ══════════════════════════════════════════
function generate() {
  const cat = $category.value;
  const pal = PALETTES[cat];
  const p = {
    name: $name.value.trim(),
    category: cat,
    catLabel: CAT_LABELS[cat],
    features: $features.value.trim(),
    featureList: $features.value.trim().split('\n').filter(Boolean).join(', '),
    target: $target.value.trim(),
    price: $price.value.trim(),
  };

  // USP (3~5개)
  const uspCount = 3 + Math.floor(Math.random() * 3);
  const uspFns = shufflePick(USP_TEMPLATES[cat] || USP_TEMPLATES['생활용품'], uspCount);
  const usps = uspFns.map(fn => fn(p));
  const emojis = shufflePick(USP_EMOJIS[cat] || USP_EMOJIS['생활용품'], uspCount);

  // 헤드라인
  const [headline, subheadline] = pick(HEADLINE_TEMPLATES)(p);

  // 상세 설명
  const detailDesc = pick(DETAIL_TEMPLATES)(p);

  // 사용법
  const howto = HOWTO_TEMPLATES[cat] || HOWTO_TEMPLATES['생활용품'];

  // FAQ
  const faqs = FAQ_TEMPLATES[cat] || FAQ_TEMPLATES['생활용품'];

  // CTA
  const cta = pick(CTA_TEMPLATES)(p);

  currentGenerated = { headline, subheadline, usps, emojis, detailDesc, howto, faqs, cta, palette: pal, product: p };

  renderPreview();
}

// ══════════════════════════════════════════
//  미리보기 렌더링
// ══════════════════════════════════════════

  // 버튼 스타일 업데이트
  $actions.style.display = 'flex';
  $btnRegen.style.background = pal.badge;
  $btnRegen.style.color = pal.primary;
  $btnDown.style.background = pal.primary;
  $btnDown.style.color = '#fff';

  // 가격 HTML
  const priceHTML = p.price ? `
    <div class="price-badge">
      <span>${formatPrice(p.price)}</span>
    </div>` : '';

  // USP HTML
  const uspHTML = g.usps.map((u, i) => `
    <div class="usp-card" style="background:${pal.secondary};">
      <div class="usp-icon" style="background:${pal.badge}; font-size:24px;">
        ${g.emojis[i] || '✅'}
      </div>
      <p>${escHtml(u)}</p>

    <div class="howto-item">
      <div class="howto-step" style="background:${pal.primary};">

      <p>${escHtml(h)}</p>

  const faqHTML = g.faqs.map(f => `

  // 상세 설명 (줄바꿈 처리)
  const detailHTML = g.detailDesc.split('\n').filter(Boolean).map(para =>
    `<p class="detail-text" style="margin-bottom:16px;">${escHtml(para)}</p>`
  ).join('');

  $preview.innerHTML = `
    <div class="preview-frame">
      <!-- 히어로 배너 -->
      <div class="dp-hero" style="background:linear-gradient(135deg, ${pal.primary}, ${pal.accent});">
        <h1>${escHtml(g.headline)}</h1>
        <p class="sub">${escHtml(g.subheadline)}</p>
        ${priceHTML}
      </div>

      <!-- USP 포인트 -->
      <div class="dp-section">
        <h2><span style="color:${pal.primary};">${escHtml(p.name)}</span>을 선택해야 하는 이유</h2>
        ${uspHTML}
      </div>

      <div class="dp-divider" style="background:${pal.secondary};"></div>

      <!-- 상세 설명 -->
      <div class="dp-section">
        <h2>제품 상세 정보</h2>
        ${detailHTML}
      </div>

      <div class="dp-divider" style="background:${pal.secondary};"></div>

      <!-- 사용법 -->
      <div class="dp-section">
        <h2>🔖 HOW TO USE</h2>
        <div class="howto-list">
          ${howtoHTML}
        </div>
      </div>

      <div class="dp-divider" style="background:${pal.secondary};"></div>

      <!-- FAQ -->
      <div class="dp-section">
        <h2>❓ 자주 묻는 질문</h2>
        ${faqHTML}
      </div>

      <!-- CTA -->
      <div class="dp-cta" style="background:${pal.secondary};">
        <h3 style="color:${pal.text};">${escHtml(g.cta)}</h3>
        <button class="cta-btn" style="background:${pal.primary};">지금 구매하기</button>
        <p class="cta-sub">무료배송 · 100% 정품 보장 · 간편 반품</p>
      </div>
    </div>
  `;
