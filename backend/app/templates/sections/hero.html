<!-- 히어로 섹션 -->
<div style="width:{{ config.page_width }}px;max-width:100%;margin:0 auto;
            background:linear-gradient(135deg, {{ palette.primary }}11 0%, {{ palette.secondary }}22 100%);
            padding:60px 40px;text-align:center;position:relative;overflow:hidden;">

    <!-- 장식 원형 -->
    <div style="position:absolute;top:-40px;right:-40px;width:200px;height:200px;
                border-radius:50%;background:{{ palette.primary }}0D;"></div>
    <div style="position:absolute;bottom:-60px;left:-30px;width:160px;height:160px;
                border-radius:50%;background:{{ palette.secondary }}0D;"></div>

    {% if images.get('hero') %}
    <div style="margin-bottom:30px;">
        <img src="{{ images.hero }}" alt="{{ copy.headline }}"
             style="max-width:400px;max-height:300px;margin:0 auto;border-radius:12px;
                    box-shadow:0 8px 30px rgba(0,0,0,0.1);">
    </div>
    {% endif %}

    {% if copy.headline %}
    <h1 style="font-size:36px;font-weight:800;color:{{ palette.text_primary }};
               margin:0 0 16px 0;letter-spacing:-0.5px;
               font-family:{{ config.font_family }};">
        {{ copy.headline }}
    </h1>
    {% endif %}

    {% if copy.subheadline %}
    <p style="font-size:18px;color:{{ palette.text_secondary }};
              margin:0 0 24px 0;font-weight:400;
              font-family:{{ config.font_family }};">
        {{ copy.subheadline }}
    </p>
    {% endif %}

    {% if copy.body_text %}
    <p style="font-size:15px;color:{{ palette.text_muted }};
              margin:0 0 32px 0;max-width:500px;margin-left:auto;margin-right:auto;
              font-family:{{ config.font_family }};">
        {{ copy.body_text }}
    </p>
    {% endif %}

    {% if copy.cta_text %}
    <div style="margin-top:20px;">
        <span style="display:inline-block;padding:16px 48px;
                     background:{{ palette.primary }};color:#FFFFFF;
                     font-size:17px;font-weight:700;border-radius:50px;
                     letter-spacing:0.5px;
                     box-shadow:0 4px 15px {{ palette.primary }}44;
                     font-family:{{ config.font_family }};">
            {{ copy.cta_text }}
        </span>
    </div>
    {% endif %}
</div>
